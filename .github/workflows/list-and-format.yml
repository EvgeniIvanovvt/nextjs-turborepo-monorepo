name: Lint & Format

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint (uses turbo pipeline "lint")
      - name: ESLint
        run: pnpm lint

      # Prettier check (your repo currently has only --write; CI should use --check)
      - name: Prettier (check)
        run: pnpm exec prettier --check "**/*.{ts,tsx,md}"
