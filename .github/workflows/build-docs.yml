name: Build (docs)

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "apps/docs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter docs build
